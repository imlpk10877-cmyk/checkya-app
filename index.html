<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckYa | ระบบเช็คยาออนไลน์</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            background-color: #f8fafc;
        }
        
        .iframe-container {
            width: 100%;
            height: 100%;
            margin-top: 0px; 
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: calc(100% + 0px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe id="appFrame" allowfullscreen></iframe>
    </div>

    <script>
        // 1. ใส่ URL ของ Google Apps Script ของคุณที่นี่ (ต้องลงท้ายด้วย /exec)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwPgZ3EcFOopU8to3d2D_zQ8wz_0wmwbFQ1sunEliMe6fmyK7B1snbMP_yBiqX-ppShfA/exec";
        
        // 2. ดึงพารามิเตอร์จาก URL ปัจจุบัน
        const urlParams = window.location.search;
        
        // 3. เอา URL ของ Apps Script มาต่อด้วยพารามิเตอร์ แล้วยัดใส่ iframe
        document.getElementById('appFrame').src = GAS_URL + urlParams;

        // 4. รับค่าจากการกดปุ่มเปลี่ยนหน้าใน iframe
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'navigate') {
                window.location.href = '?page=' + event.data.page;
            }
        });
    </script>

</body>
</html>
